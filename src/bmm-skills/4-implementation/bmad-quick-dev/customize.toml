# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for bmad-quick-dev. Mirrors the
# agent customization shape under the [workflow] namespace.

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

# Steps to run before the standard activation (config load, greet).
# Overrides append. Use for pre-flight loads, compliance checks, etc.
#
# NOTE (Story 5.6 A1 workaround, 2026-05-05): the `activation_steps_prepend = []`
# and `activation_steps_append = []` keys are intentionally OMITTED from this
# customize.toml until Story 5.5b lands `_flatten_toml` empty-array handling.
# The current engine (`resolver.py:_flatten_toml`) raises UNKNOWN_DIRECTIVE on
# empty `[workflow]` arrays without a `file:` prefix, which would crash
# `lazy_compile.py` invocations of this shim. The runtime template still
# references `{workflow.activation_steps_prepend}` / `{workflow.activation_steps_append}`
# as VarRuntime tokens — the LLM at activation-time treats "no key" as "no
# steps to run", which is identical to "empty array" semantics. Restore both
# keys with empty-array defaults once the engine fix ships per Story 5.5b
# (deferred-work.md `[engine, Story 5.5b — empty-array workflow keys]`).

# Persistent facts the workflow keeps in mind for the whole run
# (standards, compliance constraints, stylistic guardrails).
# Distinct from the runtime memory sidecar — these are static context
# loaded on activation. Overrides append.
#
# Each entry is either:
#   - a literal sentence, e.g. "All stories must include testable acceptance criteria."
#   - a file reference prefixed with `file:`, e.g. "file:{project-root}/docs/standards.md"
#     (glob patterns are supported; the file's contents are loaded and treated as facts).

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Scalar: executed when the workflow reaches its final step,
# after implementation is complete and explanations are provided. Override wins.
# Leave empty for no custom post-completion behavior.

on_complete = ""
