name: Quality & Validation

# Runs comprehensive quality checks on all PRs and pushes to main:
# - Prettier (formatting)
# - ESLint (linting)
# - markdownlint (markdown quality)
# - Installation component tests (compilation)
# Keep this workflow aligned with `npm run quality` in `package.json`.

"on":
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: markdownlint
        run: npm run lint:md

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        # Note: build-docs.mjs runs link validation internally before building
        run: npm run docs:build

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test agent compilation components
        run: npm run test:install

      - name: Validate file references
        run: npm run validate:refs

      - name: Validate skills
        run: npm run validate:skills

  validate-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # DN-R2-6 (Phil Option C 2026-05-08): no `pip install` step is needed because
      # src/scripts/compile.py is stdlib-only (per the Python compiler architecture
      # established in Stories 5.1–5.5b — no pyyaml, no requests, no third-party deps).
      # If a future story adds a non-stdlib Python import, this job MUST be updated to
      # `pip install -r <requirements>` between Setup Python and Validate compile hashes.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate compile hashes
        run: npm run validate:compile

      - name: Test validate-compile
        run: npm run test:validate-compile

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Story 7.2 e2e job: stdlib-only Python (same contract as the validate-compile job
      # above — no pip install needed; compile.py + upgrade.py + bmad_customize.writer
      # are stdlib-only). If a future story adds a non-stdlib import, add `pip install` here.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run E2E lifecycle test
        run: npm run test:e2e
